<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FullFilm - Detallar</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#0f172b]">
  <div id="detailData">
    <div class="flex flex-col justify-center items-center h-screen gap-4">
        <img src="loading.png" alt="loading" class="w-16 h-16">
        <p class="text-orange-500 text-[20px] font-bold">Məlumat yüklənir...</p>
    </div>
      
  </div>
  
  <script>
    const detailData = document.getElementById('detailData');
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

        fetch(`https://69b99a1ce69653ffe6a8318b.mockapi.io/moveData/${id}`)
            .then(res =>  res.json())
            .then(data => {
                detailData.innerHTML = `
                <div class="bg-[#0f172b] min-h-screen py-10">
                    <div class="p-4 lg:max-w-7xl max-w-4xl mx-auto">
                        <div class="grid items-start grid-cols-1 lg:grid-cols-5 gap-12 shadow-lg p-6 rounded-lg border border-gray-100">
                            <div class="lg:col-span-2 w-auto lg:sticky top-6">
                                <div class="rounded-lg overflow-hidden shadow-md">
                                    <img src="${data.poster}" alt="${data.title}" class="w-auto h-auto  lg:h-[600px]" />
                                </div>
                            </div>
                            
                            <div class="lg:col-span-3 m-auto ">
                                <h3 class="text-6xl font-bold  mb-2 text-orange-500">${data.title}</h3>
                                
                                <div class="flex flex-col space-y-2 mb-6 text-slate-600">
                                    <p><span class="font-semibold text-white">Janr:</span> ${data.genre}</p>
                                    <p><span class="font-semibold text-yellow-600">IMDB:</span> ${data.imdbRating}</p>
                                    <p><span class="font-semibold text-white">Rejissor:</span> ${data.director}</p>
                                    <p><span class="font-semibold text-white">Aktyorlar:</span> ${data.cast}</p>
                                </div>

                                <div class="border-t border-gray-100 pt-4">
                                    <h4 class="text-lg font-semibold text-white mb-2">Ssenari:</h4>
                                    <p class="text-base leading-relaxed text-slate-500">${data.scenario}</p>
                                </div>

                                <div class="mt-8">
                                    <span class="inline-block bg-slate-100 text-slate-700 px-4 py-2 rounded-full text-sm font-medium uppercase tracking-wide">
                                        ${data.type === "film" ? "Bədii Film" : "Serial"} 
                                        <span class="mx-2">|</span>
                                        ${data.type === "film" 
                                            ? `${data.details.duration} dəqiqə` 
                                            : `${data.details.seasons} sezon, ${data.details.episodes} bölüm`}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`
            })
  </script>
</body>
</html>
